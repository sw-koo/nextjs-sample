# Drop this file into your repo at .github/workflows/build.yml
#
# What this does:
#   1. Builds your Dockerfile for linux/arm64 (swkoo's cluster is ARM64)
#   2. Pushes two tags to ghcr.io/<your-login>/<your-repo>:
#        :<commit-sha>  (immutable)
#        :latest         (overwritten each push — what swkoo's cluster pulls)
#
# What you set up:
#   * Nothing in this repo's secrets — GitHub Actions ships with a built-in
#     GITHUB_TOKEN that has push access to your own GHCR.
#   * After the first push, go to your GitHub profile → Packages →
#     <this repo's package> → Package settings, and either:
#       (a) Make it Public — easiest, no pull token needed downstream
#       (b) Keep Private — generate a Personal Access Token with
#           read:packages scope and hand it to swkoo so the cluster
#           can pull (one-time)

name: Build & Push to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # required to push to ghcr.io/<owner>/...

jobs:
  build:
    # Native ARM runner — required because the cluster is aarch64.
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (latest + commit SHA)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "✅ Pushed ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ github.sha }}"
          echo "✅ Pushed ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest"
          echo "swkoo will roll this out at https://<your-app>.apps.swkoo.kr"
